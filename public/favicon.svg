<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#bg)" />
  <!-- "Quiz" in Red, Italic -->
  <text x="50" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" font-style="italic" fill="#ef4444" text-anchor="middle">Quiz</text>
  <!-- "Pam" in White -->
  <text x="50" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="900" fill="#ffffff" text-anchor="middle">Pam</text>
</svg>
